<!DOCTYPE html>
<html lang="en">
<head>
  <title>In the Wild</title>

  <style>
   #panda-area {
      position: relative;
      width: 750px;
      height: 600px;
    }
    
    #panda-photo {
      width: 750px;
      height: 600px;
      position: relative;
      z-index: 1;
    }
    
    #bamboo {
      position: absolute;
      width: 300px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <h1>In the Wild</h1>

  <label for="nameInput">What do you want to name the red panda?</label>
  <input id="nameInput" type="text" placeholder="Type a name">
  <button onclick="namePanda()">Name Panda</button>

  <div id="panda-area">
    <img id="panda-photo" src="red-panda.webp" alt="A red panda">
    <img id="bamboo" src="./bamboo.png" alt="">
  </div>

  <p id="message">The red panda is waiting for you.</p>

  <button onclick="feedPet()">Feed</button>
  <button onclick="petPet()">Pet</button>
  <button onclick="playPet()">Play</button>

  <script>
    let pandaName = "The red panda";
    let bambooIsShowing = false;

    function namePanda() {
      const name = document.getElementById("nameInput").value;

      if (name !== "") {
        pandaName = name;
        document.getElementById("message").textContent = pandaName + " is waiting for you.";
      }
    }

    function feedPet() {
      if (bambooIsShowing === true) {
        return;
      }

      bambooIsShowing = true;

      document.getElementById("message").textContent = pandaName + " is eating bamboo!";
      document.getElementById("bamboo").style.display = "block";

      setTimeout(function() {
        document.getElementById("bamboo").style.display = "none";
        document.getElementById("message").textContent = pandaName + " ate the bamboo!";
        bambooIsShowing = false;
      }, 1000);
    }

    function petPet() {
      document.getElementById("message").textContent = pandaName + " purrs happily!";
    }

    function playPet() {
      document.getElementById("message").textContent = pandaName + " is having fun!";
    }
  </script>
</body>
</html>
